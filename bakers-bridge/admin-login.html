<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login | Bakers Bridge</title>
    
    <!-- Scripts -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playfair+Display:wght@600;700&display=swap" rel="stylesheet">
    
    <!-- Custom Styles -->
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-[#FAF7F2] min-h-screen flex items-center justify-center p-6">

    <div class="reveal bg-white w-full max-w-md p-12 rounded-[50px] shadow-2xl border border-[#D7CCC8]/30">
        <div class="flex flex-col items-center mb-10">
            <img src="logo.jpeg" class="h-20 w-auto rounded-xl mb-6 shadow-sm" alt="Logo">
            <h1 class="serif text-3xl font-bold text-[#8D6E63] mb-2">Admin Portal</h1>
            <p class="text-xs text-gray-400 uppercase tracking-[0.3em] font-bold">Secure Access</p>
        </div>

        <form id="login-form" class="space-y-6">
            <div>
                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2 block">Email Address</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-300"><i data-lucide="mail" class="w-4 h-4"></i></span>
                    <input type="email" id="email" required 
                           class="w-full pl-12 pr-4 py-4 bg-[#FAF7F2] border border-transparent rounded-2xl focus:border-[#C5A059] focus:bg-white outline-none transition-all text-sm"
                           placeholder="admin@bakersbridge.com">
                </div>
            </div>

            <div>
                <label class="text-[10px] uppercase tracking-widest font-bold text-gray-400 mb-2 block">Password</label>
                <div class="relative">
                    <span class="absolute left-4 top-4 text-gray-300"><i data-lucide="lock" class="w-4 h-4"></i></span>
                    <input type="password" id="password" required 
                           class="w-full pl-12 pr-4 py-4 bg-[#FAF7F2] border border-transparent rounded-2xl focus:border-[#C5A059] focus:bg-white outline-none transition-all text-sm"
                           placeholder="••••••••">
                </div>
            </div>

            <div id="error-msg" class="text-red-400 text-[10px] font-bold uppercase tracking-widest text-center hidden">
                Invalid Credentials. Please try again.
            </div>

            <button type="submit" 
                    class="btn-premium w-full bg-[#2D2926] text-white py-5 rounded-full text-[11px] font-bold uppercase tracking-[0.2em] hover:bg-[#C5A059] shadow-lg transition-all mt-4">
                Enter Dashboard
            </button>
        </form>

        <div class="mt-10 text-center">
            <a href="index.html" class="text-[10px] text-gray-400 hover:text-[#8D6E63] transition-colors uppercase font-bold tracking-widest">
                <i data-lucide="arrow-left" class="w-3 h-3 inline-block mr-1"></i> Back to Marketplace
            </a>
        </div>
    </div>

    <script>
        lucide.createIcons();
        
        // Simple Auth Logic
        document.getElementById('login-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const pass = document.getElementById('password').value;
            const error = document.getElementById('error-msg');

            // Hardcoded for the user as requested
            if (email === 'bakersbridge.in@gmail.com' && pass === 'admin123') {
                window.location.href = 'admin.html';
            } else {
                error.classList.remove('hidden');
                setTimeout(() => error.classList.add('hidden'), 3000);
            }
        });

        // Entrance animation
        setTimeout(() => {
            document.querySelector('.reveal').classList.add('active');
        }, 100);
    </script>
</body>
</html>
