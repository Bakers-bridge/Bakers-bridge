<!DOCTYPE html>
<html>
<head>
    <title>Bakers Bridge - Connection Diagnostic</title>
    <script src="https://unpkg.com/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: sans-serif; padding: 50px; line-height: 1.6; }
        .box { padding: 20px; border-radius: 10px; margin-bottom: 20px; }
        .success { background: #d4edda; color: #155724; border: 1px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; }
        .loading { background: #fff3cd; color: #856404; border: 1px solid #ffeeba; }
    </style>
</head>
<body>
    <h1>🛰️ Bakers Bridge Connection Diagnostic</h1>
    <p>This tool checks if your browser can talk to your Supabase database from a local file.</p>
    
    <div id="status" class="box loading">Checking connection...</div>
    <div id="results" class="box" style="display:none; background: #f8f9fa; border: 1px solid #ddd;">
        <h3>Console Output:</h3>
        <pre id="log-output"></pre>
    </div>

    <script>
        const log = (msg, isError = false) => {
            const out = document.getElementById('log-output');
            out.textContent += (isError ? "❌ " : "✅ ") + msg + "\n";
            console.log(msg);
        };

        async function runTest() {
            document.getElementById('results').style.display = 'block';
            const statusBox = document.getElementById('status');
            
            try {
                log("Starting Test...");
                const SUPABASE_URL = "https://sibxliqoninvmumhccuy.supabase.co";
                const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InNpYnhsaXFvbmludm11bWhjY3V5Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzc0ODYwNDMsImV4cCI6MjA5MzA2MjA0M30.KNXUzAD-TiIEnsDPyX3s8pRzwQZdF7OnrLe37zvLCNk";

                if (!window.supabase) {
                    throw new Error("Supabase library not loaded. Check internet connection.");
                }
                log("Supabase library loaded.");

                const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
                log("Client created.");

                log("Attempting to fetch 'bakers' table...");
                const { data, error } = await db.from('bakers').select('*').limit(1);

                if (error) throw error;

                log("Bakers fetched successfully! Count: " + (data ? data.length : 0));
                
                statusBox.className = "box success";
                statusBox.innerHTML = "<h2>🎉 SUCCESS!</h2> Your browser IS connected to the database. The issue is NOT your connection or Supabase.";
            } catch (err) {
                log(err.message, true);
                statusBox.className = "box error";
                statusBox.innerHTML = "<h2>🚨 CONNECTION FAILED</h2> Error: " + err.message + "<br><br><b>Reason:</b> This is likely a 'CORS' security block from your browser. Try opening the site in a different browser (like Firefox) or using a 'Live Server' extension.";
            }
        }

        window.onload = runTest;
    </script>
</body>
</html>
